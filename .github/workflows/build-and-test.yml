name: "Build and Test"

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build-native-linux:
        name: Build libfs for ${{ matrix.libc }}-${{ matrix.arch }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x64
                      libc: glibc
                      container: mcr.microsoft.com/dotnet/sdk:8.0
                      install_cmd: apt-get update && apt-get install -y cmake build-essential
                    - arch: x64
                      libc: musl
                      container: mcr.microsoft.com/dotnet/sdk:8.0-alpine
                      install_cmd: apk add cmake make gcc g++ musl-dev
                    - arch: arm64
                      libc: glibc
                      container: mcr.microsoft.com/dotnet/sdk:8.0-arm64v8
                      install_cmd: apt-get update && apt-get install -y cmake build-essential
                    - arch: arm64
                      libc: musl
                      container: mcr.microsoft.com/dotnet/sdk:8.0-alpine-arm64v8
                      install_cmd: apk add cmake make gcc g++ musl-dev

        container: ${{ matrix.container }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install build tools
              run: ${{ matrix.install_cmd }}

            - name: Build native library
              run: |
                  mkdir -p build && cd build
                  cmake ../src/StatsdClient.Native
                  cmake --build . --config Release
                  cd ..

                  mkdir -p runtimes/linux-${{ matrix.libc }}-${{ matrix.arch }}/native
                  cp build/libfs.so runtimes/linux-${{ matrix.libc }}-${{ matrix.arch }}/native/

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: native-linux-${{ matrix.libc }}-${{ matrix.arch }}
                  path: runtimes/

    unit-tests:
        name: ${{ matrix.framework }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        needs: build-native-linux
        permissions:
            actions: read
            contents: read
        strategy:
            fail-fast: false
            matrix:
                # list all OS and frameworks here, then use "exclude" below to skip some combinations
                # and "include" to add the "sdk_version" mapping
                os: [ubuntu-latest, windows-latest, macos-latest]
                framework: [netcoreapp2.1, netcoreapp3.0, netcoreapp3.1, net5.0, net6.0, net7.0, net8.0, net9.0, net10.0, net48]
                exclude:
                    # net48 only runs on Windows: exclude in from Linux and macOS
                    - os: ubuntu-latest
                      framework: net48
                    - os: macos-latest
                      framework: net48
                    # .NET SDK macOS on arm64 (Apple Silicon) is only supported in net6.0 and above: exclude older frameworks
                    - os: macos-latest
                      framework: netcoreapp2.1
                    - os: macos-latest
                      framework: netcoreapp3.0
                    - os: macos-latest
                      framework: netcoreapp3.1
                    - os: macos-latest
                      framework: net5.0
                # map the target framework (TFM) to the .NET version.
                # we always install and use .NET SDK 10 for building everything, but we also need the matching runtime for running the tests.
                # (we only need the runtimes, not the full SDK, but `actions/setup-dotnet` can only install SDK, which includes the runtime)
                include:
                    - framework: netcoreapp2.1
                      sdk_version: 2.1.x
                    - framework: netcoreapp3.0
                      sdk_version: 3.0.x
                    - framework: netcoreapp3.1
                      sdk_version: 3.1.x
                    - framework: net5.0
                      sdk_version: 5.0.x
                    - framework: net6.0
                      sdk_version: 6.0.x
                    - framework: net7.0
                      sdk_version: 7.0.x
                    - framework: net8.0
                      sdk_version: 8.0.x
                    - framework: net9.0
                      sdk_version: 9.0.x
                    - framework: net10.0
                      sdk_version: 10.0.x
                    - framework: net48
                      sdk_version: 10.0.x

        steps:
            - name: Checkout repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
              with:
                fetch-depth: 0

            - name: Download native libraries
              uses: actions/download-artifact@v4
              with:
                  pattern: native-linux-*
                  path: runtimes/
                  merge-multiple: true

            - name: Install libssl on Linux
              # .NET 5.0 and below want libssl v1, which is not available on Ubuntu 24.04 normally
              if: runner.os == 'Linux'
              run: |
                  curl -O https://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
                  sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb

            - name: Setup .NET SDK 10.0.x
              # Always install SDK 10.0.x for building
              uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
              with:
                  dotnet-version: 10.0.x

            - name: Setup .NET SDK ${{ matrix.sdk_version }}
              # Install the version-specific .NET SDK because need the matching runtime version to run tests
              # (ideally we would install only the runtime, not the full SDK, but `actions/setup-dotnet` can only install SDKs)
              if: matrix.sdk_version != '10.0.x'
              uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
              with:
                  dotnet-version: ${{ matrix.sdk_version }}

            - name: Run tests
              run: dotnet test --blame-hang --blame-hang-dump-type none --blame-hang-timeout 60s --framework ${{ matrix.framework }}

            - name: Build NuGet package
              if: matrix.framework == 'net10.0' && matrix.os == 'ubuntu-latest'
              run: dotnet pack src/StatsdClient/StatsdClient.csproj --configuration Release

            - name: Upload NuGet package artifact
              if: matrix.framework == 'net10.0' && matrix.os == 'ubuntu-latest'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: nuget-package
                  path: ./artifacts/package/release/*.*nupkg
                  if-no-files-found: error
                  retention-days: 30
