name: "Tests"

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    unit-tests:
        name: ${{ matrix.framework }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        permissions:
            actions: read
            contents: read
        strategy:
            fail-fast: false
            matrix:
                # list all OS and frameworks here, then use "exclude" below to skip some combinations
                # and "include" to add the "sdk_version" mapping
                os: [ubuntu-latest, windows-latest, macos-latest]
                framework: [netcoreapp2.1, netcoreapp3.0, netcoreapp3.1, net5.0, net6.0, net7.0, net8.0, net9.0, net10.0, net48]
                exclude:
                    # net48 only runs on Windows, exclude from Linux and macOS
                    - os: ubuntu-latest
                      framework: net48
                    - os: macos-latest
                      framework: net48
                    # .NET SDK macOS on arm64 (Apple Silicon) is only support since net6.0, exclude older frameworks
                    - os: macos-latest
                      framework: netcoreapp2.1
                    - os: macos-latest
                      framework: netcoreapp3.0
                    - os: macos-latest
                      framework: netcoreapp3.1
                    - os: macos-latest
                      framework: net5.0
                # map the target framework (TFM) to the .NET version,
                # we always install SDK 10 to build, but we also need the matching runtime
                include:
                    - framework: netcoreapp2.1
                      sdk_version: 2.1.x
                    - framework: netcoreapp3.0
                      sdk_version: 3.0.x
                    - framework: netcoreapp3.1
                      sdk_version: 3.1.x
                    - framework: net5.0
                      sdk_version: 5.0.x
                    - framework: net6.0
                      sdk_version: 6.0.x
                    - framework: net7.0
                      sdk_version: 7.0.x
                    - framework: net8.0
                      sdk_version: 8.0.x
                    - framework: net9.0
                      sdk_version: 9.0.x
                    - framework: net10.0
                      sdk_version: 10.0.x
                    - framework: net48
                      sdk_version: 10.0.x

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install libssl on Linux
              # .NET 5.0 and below want libssl v1, which is not available on Ubuntu 24.04 normally,
              # so we manually install it here. ¯\_(ツ)_/¯
              if: runner.os == 'Linux'
              run: |
                  curl -O https://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
                  sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb

            - name: Setup .NET SDK 10.0.x
              # Always install SDK 10.0.x (needed for building since test project has net10.0 in TargetFrameworks)
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Setup framework-specific .NET SDK
              # Install the .NET SDK if it's not 10.0.x (we need the runtime to run tests)
              if: matrix.sdk_version != '10.0.x'
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ matrix.sdk_version }}

            - name: Run tests
              run: dotnet test --blame-hang --blame-hang-dump-type none --blame-hang-timeout 60s --framework ${{ matrix.framework }}
